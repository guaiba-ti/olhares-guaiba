name: Auto Create PR

on:
  push:
    branches-ignore:
      - main
      - master

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if PR already exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          # Verifica se já existe um PR aberto para esta branch
          EXISTING_PR=$(gh pr list --head "$BRANCH_NAME" --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING_PR" ]; then
            echo "✅ PR #$EXISTING_PR já existe para a branch '$BRANCH_NAME'. Nada a fazer."
            exit 0
          fi
          echo "Nenhum PR encontrado. Vamos criar um."

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          echo "🚀 Criando PR para a branch '$BRANCH_NAME'..."
          gh pr create \
            --title "PR Automático: $BRANCH_NAME" \
            --body "Este PR foi criado automaticamente a partir da branch \`${BRANCH_NAME}\`." \
            --head "$BRANCH_NAME" \
            --base main