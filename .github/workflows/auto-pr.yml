name: Auto Create PR

on:
  push:
    branches-ignore:
      - main
      - master

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: Atualização automática de ${{ github.ref_name }}
          title: 'PR automático - ${{ github.ref_name }}'
          body: |
            PR criado automaticamente da branch `${{ github.ref_name }}`
            
            Commit: ${{ github.sha }}
          branch: ${{ github.ref_name }}
          base: main
          delete-branch: false
          reviewers: ${{ github.actor }}